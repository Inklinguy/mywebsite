<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Games & Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Inter', sans-serif;
      color: #fff;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 1s ease-in-out;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 30px;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 0;
      backdrop-filter: blur(0px);
    }

    header {
      z-index: 1;
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.6);
    }

    header p {
      font-size: 1.1rem;
      font-weight: 400;
      margin-top: 10px;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
    }

    .container {
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 25px;
      padding: 30px 40px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
      text-align: center;
      max-width: 95%;
      margin-bottom: 30px;
    }

    .container p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 0 0 4px #000;
    }

    a.button {
      display: inline-block;
      margin: 10px;
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      border-radius: 50px;
      background: linear-gradient(135deg, #00b3ff, #0077b3);
      box-shadow: 0 6px 20px rgba(0, 179, 255, 0.5);
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    a.button:hover {
      background: linear-gradient(135deg, #0077b3, #00b3ff);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0, 179, 255, 0.6);
    }

    a.map-button {
      background: linear-gradient(135deg, #ff7f50, #ff4500);
      box-shadow: 0 6px 20px rgba(255, 69, 0, 0.5);
    }

    a.map-button:hover {
      background: linear-gradient(135deg, #ff4500, #ff7f50);
      box-shadow: 0 10px 25px rgba(255, 69, 0, 0.6);
      transform: translateY(-3px) scale(1.05);
    }

    .map-frame {
      width: 100%;
      max-width: 1200px;
      height: 600px;
      border: 0;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      margin-bottom: 50px;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8rem;
      }

      .container {
        width: 90%;
        padding: 20px;
      }

      a.button {
        padding: 10px 25px;
        font-size: 0.95rem;
      }

      .map-frame {
        height: 400px;
      }
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.5rem;
      }

      .map-frame {
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>These are my Roblox and Web Games</h1>
    <p>Explore and play my awesome games!</p>
  </header>

  <div class="container">
    <p>Play my games here:</p>
    <a href="games.html" class="button">Check Out My Roblox Games</a>
    <a href="Webgames.html" class="button">Check Out My Web Games</a>
    <p>Or view my Coolest Locations map:</p>
    <a href="https://inklinguy.github.io/eddiesmap/Coolest_Locations-checkpoint.html" 
       target="_blank" 
       rel="noopener noreferrer"
       class="button map-button">
       Open the Coolest Locations Map
    </a>
  </div>

  <!-- Embedded Map -->
  <iframe 
    class="map-frame" 
    src="https://inklinguy.github.io/eddiesmap/Coolest_Locations-checkpoint.html" 
    allowfullscreen>
  </iframe>

</body>
</html>
