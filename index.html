<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David | Play, Explore, Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07110d;
      --panel: rgba(8, 17, 14, 0.72);
      --panel-strong: rgba(8, 17, 14, 0.88);
      --line: rgba(130, 255, 128, 0.18);
      --line-strong: rgba(130, 255, 128, 0.34);
      --text: #f5fff2;
      --muted: #bad0c1;
      --green: #8bff6f;
      --green-deep: #38d46b;
      --cyan: #5ef2ff;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      font-family: "Manrope", sans-serif;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.05);
      transition: background-image 900ms ease, transform 6s ease;
      filter: saturate(1.08) contrast(1.02);
    }

    .bg::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(94, 242, 255, 0.08), transparent 24%),
        radial-gradient(circle at 80% 18%, rgba(139, 255, 111, 0.14), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(139, 255, 111, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(3, 8, 6, 0.2), rgba(3, 8, 6, 0.72) 45%, rgba(3, 8, 6, 0.94));
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,0.8), rgba(0,0,0,0.25));
      opacity: 0.28;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.2;
      z-index: 0;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb.one {
      width: 280px;
      height: 280px;
      background: var(--green);
      top: 14%;
      left: -80px;
    }

    .orb.two {
      width: 240px;
      height: 240px;
      background: var(--cyan);
      right: -60px;
      top: 22%;
      animation-delay: 1.8s;
    }

    .orb.three {
      width: 320px;
      height: 320px;
      background: #4ee86e;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 0.8s;
    }

    @keyframes drift {
      from { transform: translateY(-10px) scale(1); }
      to { transform: translateY(18px) scale(1.08); }
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1320px, calc(100% - 28px));
      margin: 18px auto 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      margin-bottom: 18px;
      border-radius: 24px;
      background: rgba(7, 14, 11, 0.52);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
    }

    .brand {
      font-family: "Orbitron", sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--green);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: var(--muted);
    }
